# Generated by scripts/build_overlay.py
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  prefer-h3: false
  respect-rules: true
  use-system-hosts: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - +.lan
    - +.local
    - +.msftconnecttest.com
    - +.msftncsi.com
    - localhost.ptlogin2.qq.com
    - localhost.sec.qq.com
    - localhost.work.weixin.qq.com
  default-nameserver:
    - 223.5.5.5
    - 1.2.4.8
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://77.88.8.8/dns-query
    - https://8.8.4.4/dns-query#ecs=1.1.1.1/24&ecs-override=true
    - https://208.67.222.222/dns-query#ecs=1.1.1.1/24&ecs-override=true
    - https://9.9.9.9/dns-query
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: false
  nameserver-policy:
    geosite:cn:
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query

rule-providers:
  applications:
    type: http
    behavior: classical
    format: text
    path: ./ruleset/loyalsoldier/applications.txt
    interval: 86400
    url: https://rules.example.com/loyalsoldier/applications.txt
  private:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/loyalsoldier/private.txt
    interval: 86400
    url: https://rules.example.com/loyalsoldier/private.txt
  direct:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/loyalsoldier/direct.txt
    interval: 86400
    url: https://rules.example.com/loyalsoldier/direct.txt
  lancidr:
    type: http
    behavior: ipcidr
    format: text
    path: ./ruleset/loyalsoldier/lancidr.txt
    interval: 86400
    url: https://rules.example.com/loyalsoldier/lancidr.txt
  cncidr:
    type: http
    behavior: ipcidr
    format: text
    path: ./ruleset/loyalsoldier/cncidr.txt
    interval: 86400
    url: https://rules.example.com/loyalsoldier/cncidr.txt

proxy-groups:
  - name: 代理模式
    type: select
    proxies:
      - 绕过大陆丨白名单(Whitelist)
      - 绕过大陆丨黑名单(GFWlist)

  - name: 节点选择
    type: select
    proxies:
      - PROXY
      - DIRECT

  - name: PROXY
    type: select
    proxies:
      - 节点选择
      - DIRECT

  - name: 绕过大陆丨黑名单(GFWlist)
    type: select
    proxies:
      - DIRECT

  - name: 绕过大陆丨白名单(Whitelist)
    type: select
    proxies:
      - PROXY

rules:
  - DOMAIN-SUFFIX,your-domain.example,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - DOMAIN-SUFFIX,lan,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-SUFFIX,notes.example,DIRECT
  - DOMAIN-SUFFIX,api.example,DIRECT
  - PROCESS-NAME,adb.exe,DIRECT
  - PROCESS-NAME,ssh.exe,DIRECT
  - GEOSITE,CN,DIRECT
  - RULE-SET,applications,DIRECT
  - RULE-SET,private,DIRECT
  - RULE-SET,direct,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve
  - RULE-SET,cncidr,DIRECT,no-resolve
  - GEOIP,LAN,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,代理模式
